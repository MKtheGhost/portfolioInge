<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ------ NAV BAR ------ -->
  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="#title" class="nav-logo">Title</a></li>
      <li><a href="#presentation">Presentation</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#journey">Journey</a></li>
      <li><a href="#work">Work</a></li>
      <li><a href="#future">Future</a></li>
    </ul>
  </nav>

  <!-- ------ HERO / TITLE ------ -->
  <section class="hero" id="title">
    <h1 class="hero-title">PORTFOLIO</h1>
    <div class="hero-avatar">
      <img src="ressources/circle photo.png" alt="Photo de profil">
    </div>
  </section>

  <!-- ------ PRESENTATION / ABOUT ME ------ -->
  <section class="about" id="presentation">
    <div class="about-stripe"></div>
    <div class="about-container">
      <div class="about-paper">

        <!-- left decorations -->
        <div class="about-ticket">
          <img src="img/ticket.png" alt="">
        </div>
        <div class="about-grid">
          <img src="img/grid-paper.png" alt="">
        </div>
        <div class="about-photo">
          <img src="img/clip-top.png" alt="" class="about-clip-top">
          <img src="" alt="Photo">
        </div>

        <!-- content -->
        <h2 class="about-title">ABOUT ME</h2>
        <p class="about-text">
          <!-- Texte de présentation ici -->
        </p>

        <!-- right decorations -->
        <div class="about-envelope">
          <img src="ressources/Rectangle.png" alt="">
        </div>
        <div class="about-clip-right">
          <img src="img/clip-right.png" alt="">
        </div>

      </div>
    </div>
  </section>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ------ NAV BAR ------ -->
  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="#title" class="nav-logo">Title</a></li>
      <li><a href="#presentation">Presentation</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#journey">Journey</a></li>
      <li><a href="#work">Work</a></li>
      <li><a href="#future">Future</a></li>
    </ul>
  </nav>

  <!-- ------ HERO / TITLE ------ -->
  <section class="hero" id="title">
    <h1 class="hero-title">PORTFOLIO</h1>
    <div class="hero-avatar">
      <img src="ressources/circle photo.png" alt="Photo de profil">
    </div>
  </section>

  <!-- ------ PRESENTATION / ABOUT ME ------ -->
  <section class="about" id="presentation">
    <div class="about-stripe"></div>
    <div class="about-container">
      <div class="about-paper">

        <!-- décoration centrale -->
        <div class="about-envelope">
          <img src="ressources/about_me.png" alt="">
        </div>
        <div class="about-clip-right">
          <img src="img/clip-right.png" alt="">
        </div>

      </div>
    </div>
  </section>

  <!-- ------ SKILLS / MES COMPETENCES ------ -->
  <section class="skills" id="skills">
    <div class="skills-header">
      <h2 class="skills-title">MES COMPETENCES</h2>
      <p class="skills-text">asdasdasdadadadadad</p>
    </div>

    <div class="skills-polaroids">
      <div class="polaroid polaroid-1">
        <img src="ressources/skill1.png" alt="">
      </div>
      <div class="polaroid polaroid-2">
        <img src="ressources/skill2.png" alt="">
      </div>
      <div class="polaroid polaroid-3">
        <img src="ressources/skill3.png" alt="">
      </div>
    </div>
  </section>

</body>
</html>
